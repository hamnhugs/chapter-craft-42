name: Build & Release BookWorm APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'apk-*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass bookworm2026 \
            -keypass bookworm2026 \
            -dname "CN=BookWorm,OU=App,O=BookWorm,L=US,ST=US,C=US"
          echo "Keystore created"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/android.keystore \
            -Pandroid.injected.signing.store.password=bookworm2026 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=bookworm2026

      - name: Find APK
        run: |
          find android -name "*.apk" | head -5
          ls -lh android/app/build/outputs/apk/release/ 2>/dev/null || echo "checking other paths"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookWorm-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BookWorm Studio — Android App"
          body: |
            ## 📚 BookWorm Studio Android App

            **Install on your Android phone:**
            1. Tap the `.apk` file below to download
            2. Open it on your Android device
            3. If asked, allow "Install from unknown sources"
            4. Install and enjoy BookWorm!

            > Requires Android 5.0+ and Google Chrome
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
