<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>BookWorm — Chapter Craft</title>
    <meta name="description" content="Read and study books chapter by chapter. Your personal reading library." />
    <meta name="author" content="BookWorm" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA / Install -->
    <link rel="manifest" href="/chapter-craft-42/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BookWorm" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/chapter-craft-42/icons/icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/chapter-craft-42/icons/icon-180.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="BookWorm — Chapter Craft" />
    <meta property="og:description" content="Read and study books chapter by chapter." />
    <meta property="og:type" content="website" />

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
